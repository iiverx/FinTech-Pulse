kind = "mobile"
previewPath = "/mobile/"
title = "نبض Mobile"
version = "1.0.0"
id = "artifacts/nabdh-pulse-mobile"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/mobile/" ]
localPort = 22986

[services.development]
run = "pnpm --filter @workspace/nabdh-pulse-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nabdh-pulse-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/nabdh-pulse-mobile", "run", "serve" ]

[services.env]
PORT = "22986"
BASE_PATH = "/mobile/"
